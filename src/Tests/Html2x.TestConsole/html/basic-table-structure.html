<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Basic Table Structure</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 24px;
                color: #111827;
            }

            h1,
            h2 {
                margin-bottom: 12px;
            }

            p {
                margin: 0 0 16px;
            }

            .section {
                margin-bottom: 32px;
            }
        </style>
    </head>
    <body>
        <h1>Basic Table Structure</h1>

        <div class="section">
            <h2>Example 1: Simple 2x2 Table</h2>
            <table style="width: 400px; border: 1px solid black;">
                <tr>
                    <td style="padding: 10px; border: 1px solid black;">A</td>
                    <td style="padding: 10px; border: 1px solid black;">B</td>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid black;">C</td>
                    <td style="padding: 10px; border: 1px solid black;">D</td>
                </tr>
            </table>
        </div>

        <div class="section">
            <h2>Example 2: Header And Background Styling</h2>
            <table style="width: 400px; border: 1px solid black;">
                <tr style="background-color: #d1d5db;">
                    <th style="padding: 10px; border: 1px solid black;">Name</th>
                    <th style="padding: 10px; border: 1px solid black;">Status</th>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid black;">Alpha</td>
                    <td style="padding: 10px; border: 1px solid black; background-color: #fef3c7;">Ready</td>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid black;">Beta</td>
                    <td style="padding: 10px; border: 1px solid black;">Queued</td>
                </tr>
            </table>
        </div>

        <!-- Unsupported merged-cell sample for manual diagnostics checks -->
        <div class="section">
            <h2>Unsupported Example: Colspan</h2>
            <p>This sample should trigger unsupported table diagnostics.</p>
            <table style="width: 400px; border: 1px solid black;">
                <tr>
                    <td style="padding: 10px; border: 1px solid black;" colspan="2">Merged Header</td>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid black;">Left</td>
                    <td style="padding: 10px; border: 1px solid black;">Right</td>
                </tr>
            </table>
        </div>
    </body>
</html>
